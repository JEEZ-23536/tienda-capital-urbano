<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Capital Urbano</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
                :root {
                        --cu-dark: #2B1E16;
                        --cu-brown: #4A3525;
                        --cu-accent: #A67C52;
                        --bg-color: #F4F1EA;
                        --text-main: #1A110B;
                        --wa-green: #25D366;

        }

                * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                        font-family: 'Poppins', sans-serif;

        }

                body {
                        background-color: var(--bg-color);
                        color: var(--text-main);

        }

                    body:not(.modo-admin) .admin-only {
                            display: none !important;

        }

                    body.modo-admin .login-only {
                            display: none !important;

        }

                header {
                        background-color: var(--cu-dark);
                        color: white;
                        padding: 1.5rem 20px;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        text-align: center;
                        position: relative;
                        border-bottom: 4px solid var(--cu-accent);

        }

                .logo-container {
                        display: flex;
                        align-items: center;
                        gap: 15px;
                        margin-bottom: 10px;

        }

                    .logo-container img {
                            width: 70px;
                            height: 70px;
                            border-radius: 50%;
                            border: 2px solid var(--cu-accent);
                            object-fit: cover;
                            cursor: pointer; /* Indica que se puede hacer clic */

        }

                header h1 {
                        font-size: 2.5rem;
                        letter-spacing: 2px;
                        text-transform: uppercase;

        }

                    header h1 span {
                            color: var(--cu-accent);
                            font-weight: 300;

        }

                .header-actions {
                        display: flex;
                        gap: 10px;
                        position: absolute;
                        right: 20px;
                        top: 20px;

        }

                .search-container {
                        width: 100%;
                        max-width: 800px;
                        display: flex;
                        margin-top: 15px;

        }

                    .search-container input {
                            flex-grow: 1;
                            padding: 12px 20px;
                            border: none;
                            border-radius: 4px 0 0 4px;
                            outline: none;
                            font-size: 1rem;

        }

                    .search-container button {
                            padding: 10px 20px;
                            background-color: var(--cu-accent);
                            border: none;
                            border-radius: 0 4px 4px 0;
                            cursor: pointer;
                            color: white;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            transition: 0.2s;

        }

                        .search-container button:hover {
                                background-color: #8a6541;

        }

                .container {
                        max-width: 1400px;
                        margin: 20px auto;
                        padding: 0 15px;

        }

                .btn {
                        padding: 10px 15px;
                        border: none;
                        border-radius: 4px;
                        cursor: pointer;
                        font-weight: 600;
                        transition: 0.2s;
                        font-size: 0.95rem;
                        color: white;

        }

                    .btn:hover {
                            opacity: 0.9;

        }

                .btn-admin {
                        background-color: var(--cu-brown);

        }

                .btn-login {
                        background-color: transparent;
                        border: 1px solid var(--cu-accent);
                        color: var(--cu-accent);

        }

                .btn-danger {
                        background-color: #a83232;

        }

                .btn-google {
                        background-color: #4285F4;
                        width: 100%;
                        margin-top: 10px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 8px;

        }

                .btn-wa {
                        background-color: var(--wa-green);
                        width: 100%;
                        margin-top: 10px;
                        font-size: 1rem;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 8px;

        }

                    .btn-wa:disabled {
                            background-color: #ccc;
                            cursor: not-allowed;

        }

                .admin-toolbar {
                        background: white;
                        padding: 15px;
                        border-radius: 8px;
                        margin-bottom: 20px;
                        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
                        display: flex;
                        gap: 10px;
                        justify-content: center;
                        flex-wrap: wrap;

        }

                .panel {
                        background: white;
                        padding: 20px;
                        border-radius: 8px;
                        margin-bottom: 20px;
                        display: none;
                        border-top: 3px solid var(--cu-accent);
                        box-shadow: 0 4px 10px rgba(0,0,0,0.05);

        }

                .form-grid {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                        gap: 15px;
                        margin-bottom: 15px;

        }

                input, select {
                        padding: 10px;
                        border: 1px solid #ccc;
                        border-radius: 4px;
                        width: 100%;
                        font-size: 1rem;

        }

                #sizeContainer, #eSizeContainer {
                        display: none;

        }

                .file-input-wrapper {
                        border: 2px dashed #ccc;
                        padding: 10px;
                        border-radius: 4px;
                        text-align: center;
                        background: #fafafa;
                        margin-bottom: 15px;

        }

                .modal-overlay {
                        display: none;
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: rgba(0,0,0,0.7);
                        z-index: 1000;
                        justify-content: center;
                        align-items: center;
                        padding: 20px;

        }

                .modal-box {
                        background: white;
                        padding: 30px;
                        border-radius: 8px;
                        width: 100%;
                        max-width: 400px;
                        text-align: center;
                        max-height: 90vh;
                        overflow-y: auto;

        }

                    .modal-box h2 {
                            margin-bottom: 20px;
                            color: var(--cu-dark);

        }

                    .modal-box input, .modal-box select {
                            margin-bottom: 15px;

        }

                    .modal-box .btn-admin {
                            width: 100%;

        }

                .divider {
                        margin: 15px 0;
                        color: #888;
                        font-size: 0.9rem;

        }

                .close-btn {
                        background: none;
                        border: none;
                        font-size: 1.5rem;
                        float: right;
                        cursor: pointer;
                        color: #666;
                        margin-top: -20px;
                        margin-right: -10px;

        }

                .products-grid {
                        display: grid;
                        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                        gap: 20px;
                        margin-top: 20px;

        }

                .product-card {
                        background: white;
                        border-radius: 8px;
                        overflow: hidden;
                        display: flex;
                        flex-direction: column;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                        transition: transform 0.2s;

        }

                    .product-card:hover {
                            transform: translateY(-5px);
                            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
                            border-bottom: 3px solid var(--cu-accent);

        }

                    .product-card.agotado {
                            opacity: 0.7;
                            filter: grayscale(50%);

        }

                .product-image-container {
                        width: 100%;
                        height: 260px;
                        background-color: #fff;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        overflow: hidden;
                        position: relative;

        }

                    .product-image-container img {
                            width: 100%;
                            height: 100%;
                            object-fit: cover;

        }

                .badge-agotado {
                        position: absolute;
                        top: 10px;
                        left: 10px;
                        background: #a83232;
                        color: white;
                        padding: 5px 10px;
                        font-weight: bold;
                        border-radius: 4px;
                        letter-spacing: 1px;

        }

                .product-info {
                        padding: 15px;
                        display: flex;
                        flex-direction: column;
                        flex-grow: 1;

        }

                .product-title {
                        font-size: 1.1rem;
                        font-weight: 600;
                        color: var(--cu-dark);
                        text-transform: uppercase;

        }

                .product-meta {
                        font-size: 0.85rem;
                        color: #666;
                        margin-top: 5px;

        }

                .product-price {
                        font-size: 1.5rem;
                        font-weight: 700;
                        margin: 10px 0;
                        color: var(--cu-brown);

        }

                .stock-badge {
                        padding: 4px 10px;
                        border-radius: 12px;
                        font-weight: bold;
                        font-size: 0.8rem;
                        background: #f0e6dc;
                        color: var(--cu-brown);
                        width: fit-content;

        }

                .admin-controls {
                        display: flex;
                        flex-wrap: wrap;
                        gap: 5px;
                        margin-top: 15px;

        }

                .btn-delete-card {
                        background: #fce8e8;
                        color: #c62828;
                        border: 1px solid #ffcdd2;
                        flex: 1 1 45%;
                        padding: 8px;
                        border-radius: 4px;
                        cursor: pointer;
                        font-weight: 600;
                        font-size: 0.85rem;

        }

                .btn-sold-card {
                        background: #e3f2fd;
                        color: #0277bd;
                        border: 1px solid #b3e5fc;
                        flex: 1 1 45%;
                        padding: 8px;
                        border-radius: 4px;
                        cursor: pointer;
                        font-weight: 600;
                        font-size: 0.85rem;

        }

                .btn-edit-card {
                        background: #fff3e0;
                        color: #e65100;
                        border: 1px solid #ffe0b2;
                        flex: 1 1 100%;
                        padding: 8px;
                        border-radius: 4px;
                        cursor: pointer;
                        font-weight: 600;
                        font-size: 0.85rem;

        }

                .csv-box {
                        background: #e9ecef;
                        padding: 15px;
                        border-radius: 8px;
                        margin-bottom: 15px;
                        border: 1px solid #ced4da;

        }
        /* 📱 OPTIMIZACIÓN MÓVIL TIPO APP */
        @media (max-width: 600px) {

            header {
                padding: 10px;
            }

                header h1 {
                    font-size: 1.5rem;
                }

            .logo-container img {
                width: 50px;
                height: 50px;
            }

            .search-container input {
                padding: 8px;
                font-size: 0.9rem;
            }

            .search-container button {
                padding: 8px;
            }

            .products-grid {
                grid-template-columns: repeat(2, 1fr); /* 🔥 2 columnas */
                gap: 10px;
            }

            .product-image-container {
                height: 150px; /* 🔥 más compacto */
            }

            .product-title {
                font-size: 0.9rem;
            }

            .product-price {
                font-size: 1.2rem;
            }

            .product-info {
                padding: 10px;
            }

            .btn {
                font-size: 0.8rem;
                padding: 8px;
            }

            .modal-box {
                padding: 20px;
                max-width: 90%;
            }
        }


    </style>

</head>
<body>

    <header>
        <div class="header-actions">
            <button class="btn btn-danger admin-only" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>

        <div class="logo-container">
            <img src="LOGO CAPITAL URBANO.jpg" alt="Logo Capital Urbano" onclick="document.getElementById('loginModal').style.display='flex'">
            <h1>Capital <span>Urbano</span></h1>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar Ropa, Accesorios..." onkeyup="filterData()">
            <button title="Buscar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </header>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="document.getElementById('loginModal').style.display='none'">×</button>
            <h2>Administración</h2>

            <input type="email" id="loginEmail" placeholder="Correo electrónico">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button class="btn btn-admin" onclick="iniciarSesion()">Ingresar con Correo</button>

            <div class="divider">O también</div>

            <button class="btn btn-google" onclick="loginGoogle()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                </svg>
                Ingresar con Google
            </button>
        </div>
    </div>

    <div id="editModal" class="modal-overlay admin-only">
        <div class="modal-box" style="max-width: 500px;">
            <button class="close-btn" onclick="document.getElementById('editModal').style.display='none'">×</button>
            <h2>Editar Producto</h2>

            <input type="text" id="eName" placeholder="Nombre del producto">

            <select id="eCat" onchange="verificarCategoriaEdit()">
                <option value="Ropa">Ropa</option>
                <option value="Audífonos">Audífonos</option>
                <option value="Accesorios">Accesorios</option>
            </select>

            <div id="eSizeContainer"><input type="text" id="eSize" placeholder="Talla (S, M, L, XL...)"></div>

            <input type="text" id="eColor" placeholder="Color o Estilo">
            <input type="number" id="ePrice" placeholder="Precio ($)">
            <input type="number" id="eStock" placeholder="Stock disponible">

            <label style="font-weight: 600; color: #666; font-size: 0.9rem; text-align: left; display: block; margin-bottom: 5px;">URL de la Imagen:</label>
            <input type="text" id="eImageUrl" placeholder="Ej: https://misitio.com/foto.jpg">

            <button class="btn btn-admin" style="width: 100%; margin-top: 10px; background-color: #e65100;" onclick="saveEdit()">💾 Guardar Cambios</button>
        </div>
    </div>

    <div class="container">
        <div class="admin-toolbar admin-only">
            <button class="btn btn-admin" onclick="togglePanel('adminPanel')">➕ Agregar Manual / URL</button>
            <button class="btn btn-admin" onclick="togglePanel('csvPanel')" style="background-color: #2e7d32;">📊 Subir con Excel (CSV)</button>
        </div>

        <div id="csvPanel" class="panel admin-only">
            <h3>Carga Masiva desde Excel (.csv)</h3>
            <p style="font-size: 0.9rem; margin-bottom: 10px;">Formato de columnas requerido: <strong>Nombre, Categoria, Talla, Color, Precio, Stock, ImagenURL</strong></p>
            <div class="csv-box">
                <input type="file" id="csvFile" accept=".csv">
                <button class="btn btn-admin" style="margin-top: 10px; background-color: #2e7d32;" onclick="uploadCSV()">Cargar Archivo CSV</button>
            </div>
        </div>

        <div id="adminPanel" class="panel admin-only">
            <h3>Detalles del Nuevo Producto</h3><br>
            <div class="form-grid">
                <input type="text" id="pName" placeholder="Nombre del producto">
                <select id="pCat" onchange="verificarCategoria()">
                    <option value="Ropa">Ropa</option>
                    <option value="Audífonos">Audífonos</option>
                    <option value="Accesorios">Accesorios</option>
                </select>
                <div id="sizeContainer" style="display:block;"><input type="text" id="pSize" placeholder="Talla (S, M, L, XL...)"></div>
                <input type="text" id="pColor" placeholder="Color o Estilo">
                <input type="number" id="pPrice" placeholder="Precio ($)">
                <input type="number" id="pStock" placeholder="Stock disponible">
            </div>

            <div class="file-input-wrapper">
                <label style="font-weight: bold; color: var(--cu-brown); display:block; margin-bottom: 5px;">Sube una foto O Pega un URL:</label>
                <input type="file" id="pImageFile" accept="image/*" style="margin-bottom: 10px;">
                <input type="text" id="pImageUrl" placeholder="Ej: https://misitio.com/foto.jpg" style="background: white;">
            </div>

            <button id="btnGuardar" class="btn btn-admin" style="width: 100%; font-size: 1.1rem;" onclick="addProduct()">🚀 Publicar en Tienda</button>
        </div>

        <div class="products-grid" id="catalogGrid"></div>
    </div>

    <script>
        // 1. CONEXIÓN A FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAi_zMHobr2znFcxmC8NA5KJTeT_JmCcqs",
            authDomain: "mirely-esc.firebaseapp.com",
            projectId: "mirely-esc",
            storageBucket: "mirely-esc.firebasestorage.app",
            messagingSenderId: "596850005874",
            appId: "1:596850005874:web:ecd25b7fcec094ef87efeb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();
        const miNumeroWhatsApp = "529601366344";
        auth.getRedirectResult()
            .then((result) => {
                if (result.user) {
                    console.log("Redirect OK:", result.user.email);
                }
            })
            .catch((error) => {
                console.error("Error redirect:", error);
            });

        // 2. SISTEMA DE LOGIN Y TALLAS
        const admins = [
            "vicjoelescobar@gmail.com",
            "caixbaelsa2@gmail.com"
        ].map(e => e.toLowerCase());

        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log("Detectado:", user.email);

                if (admins.includes(user.email.toLowerCase())) {
                    document.body.classList.add('modo-admin');
                    document.getElementById('loginModal').style.display = 'none';
                } else {
                    document.body.classList.remove('modo-admin');
                }
            } else {
                document.body.classList.remove('modo-admin');
            }
        });
        function iniciarSesion() {
            auth.signInWithEmailAndPassword(
                document.getElementById('loginEmail').value,
                document.getElementById('loginPass').value
            ).catch(e => alert("Error: " + e.message));
        }
       
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();

            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                // 📱 celular
                auth.signInWithRedirect(provider);
            } else {
                // 💻 computadora
                auth.signInWithPopup(provider)
                    .catch(e => alert("Error: " + e.message));
            }
        }
        function cerrarSesion() { auth.signOut(); }
        function togglePanel(panelId) { const p = document.getElementById(panelId); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

        function verificarCategoria() {
            document.getElementById('sizeContainer').style.display = document.getElementById('pCat').value === "Ropa" ? "block" : "none";
            if (document.getElementById('pCat').value !== "Ropa") document.getElementById('pSize').value = "";
        }

        function verificarCategoriaEdit() {
            document.getElementById('eSizeContainer').style.display = document.getElementById('eCat').value === "Ropa" ? "block" : "none";
            if (document.getElementById('eCat').value !== "Ropa") document.getElementById('eSize').value = "";
        }

        // 3. BASE DE DATOS Y RENDERIZADO
        let inventoryData = [];
        db.collection("productos").onSnapshot((querySnapshot) => {
            inventoryData = [];
            querySnapshot.forEach((doc) => { inventoryData.push({ id: doc.id, ...doc.data() }); });
            renderCatalog(inventoryData);
        });

        function renderCatalog(data) {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';
            data.forEach(item => {
                let tallaHTML = item.size ? ` | Talla: ${item.size}` : '';
                let colorHTML = item.color ? ` | Color: ${item.color}` : '';

                let stockDisponible = item.stock > 0;
                let claseAgotado = stockDisponible ? '' : 'agotado';
                let badgeAgotado = stockDisponible ? '' : '<div class="badge-agotado">AGOTADO</div>';

                let msjWa = encodeURIComponent(`Hola, me interesa el producto "${item.name}"${item.size ? ' (Talla: ' + item.size + ')' : ''}. ¿Sigue disponible?`);
                let linkWa = `https://wa.me/${miNumeroWhatsApp}?text=${msjWa}`;

                grid.innerHTML += `
                            <div class="product-card ${claseAgotado}">
                                <div class="product-image-container">
                                    ${badgeAgotado}
                                    <img src="${item.imageUrl}" alt="${item.name}">
                                </div>
                                <div class="product-info">
                                    <h3 class="product-title">${item.name}</h3>
                                    <p class="product-meta">Categoría: ${item.category}${tallaHTML}${colorHTML}</p>
                                    <div class="product-price">$${item.price}</div>
                                    <div><span class="stock-badge">Stock: ${item.stock}</span></div>

                                    <a href="${linkWa}" target="_blank" style="text-decoration:none;">
                                        <button class="btn btn-wa" ${!stockDisponible ? 'disabled' : ''}>
                                            ${stockDisponible ? '💬 Me interesa' : 'Agotado'}
                                        </button>
                                    </a>

                                    <div class="admin-controls admin-only">
                                        <button class="btn-sold-card" onclick="reduceStock('${item.id}', ${item.stock})" ${!stockDisponible ? 'disabled' : ''}>Vendido (-1)</button>
                                        <button class="btn-delete-card" onclick="deleteProduct('${item.id}')">Borrar</button>
                                        <button class="btn-edit-card" onclick="openEditModal('${item.id}')">✏️ Editar Producto</button>
                                    </div>
                                </div>
                            </div>
                        `;
            });
        }

        // 4. FUNCIONES CRUD Y ADMIN
        async function addProduct() {
            const name = document.getElementById('pName').value;
            const category = document.getElementById('pCat').value;
            const size = document.getElementById('pSize').value;
            const color = document.getElementById('pColor').value;
            const price = document.getElementById('pPrice').value;
            const stock = document.getElementById('pStock').value;
            const fileInput = document.getElementById('pImageFile');
            const urlInput = document.getElementById('pImageUrl').value;

            if (!name || !price || !stock) return alert("Nombre, Precio y Stock son obligatorios.");

            document.getElementById('btnGuardar').innerText = "⏳ Guardando...";
            let finalImageUrl = urlInput || "https://via.placeholder.com/250x250?text=Capital+Urbano";

            try {
                if (fileInput.files.length > 0) {
                    const storageRef = storage.ref('productos/' + Date.now() + '_' + fileInput.files[0].name);
                    await storageRef.put(fileInput.files[0]);
                    finalImageUrl = await storageRef.getDownloadURL();
                }

                await db.collection("productos").add({
                    name: name, category: category, size: size, color: color,
                    price: parseFloat(price), stock: parseInt(stock), imageUrl: finalImageUrl,
                    fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.querySelectorAll('#adminPanel input').forEach(i => i.value = '');
                togglePanel('adminPanel');
            } catch (error) { alert("Error al guardar."); }
            finally { document.getElementById('btnGuardar').innerText = "🚀 Publicar en Tienda"; }
        }

        function deleteProduct(id) {
            if (confirm("¿Seguro que deseas eliminar este producto?")) db.collection("productos").doc(id).delete();
        }

        function reduceStock(id, currentStock) {
            if (currentStock > 0) db.collection("productos").doc(id).update({ stock: currentStock - 1 });
        }

        // --- FUNCIONES DE EDICIÓN ---
        let currentEditId = null;

        function openEditModal(id) {
            const item = inventoryData.find(i => i.id === id);
            if (!item) return;

            currentEditId = id;

            document.getElementById('eName').value = item.name;
            document.getElementById('eCat').value = item.category;
            verificarCategoriaEdit();
            document.getElementById('eSize').value = item.size || '';
            document.getElementById('eColor').value = item.color || '';
            document.getElementById('ePrice').value = item.price;
            document.getElementById('eStock').value = item.stock;
            document.getElementById('eImageUrl').value = item.imageUrl || '';

            document.getElementById('editModal').style.display = 'flex';
        }

        function saveEdit() {
            if (!currentEditId) return;

            const updatedData = {
                name: document.getElementById('eName').value,
                category: document.getElementById('eCat').value,
                size: document.getElementById('eSize').value,
                color: document.getElementById('eColor').value,
                price: parseFloat(document.getElementById('ePrice').value),
                stock: parseInt(document.getElementById('eStock').value),
                imageUrl: document.getElementById('eImageUrl').value
            };

            db.collection("productos").doc(currentEditId).update(updatedData)
                .then(() => {
                    document.getElementById('editModal').style.display = 'none';
                    currentEditId = null;
                })
                .catch(e => alert("Error al actualizar el producto: " + e.message));
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderCatalog(inventoryData.filter(i => i.name.toLowerCase().includes(query) || i.category.toLowerCase().includes(query) || (i.color && i.color.toLowerCase().includes(query))));
        }

        // 5. CARGA MASIVA CSV
        function uploadCSV() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert("Selecciona un archivo CSV.");

            const reader = new FileReader();
            reader.onload = function (e) {
                const text = e.target.result;
                const rows = text.split('\n');

                let guardados = 0;
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;

                    const cols = rows[i].split(',');
                    if (cols.length >= 7) {
                        db.collection("productos").add({
                            name: cols[0].trim(),
                            category: cols[1].trim(),
                            size: cols[2].trim(),
                            color: cols[3].trim(),
                            price: parseFloat(cols[4].trim()),
                            stock: parseInt(cols[5].trim()),
                            imageUrl: cols[6].trim()
                        });
                        guardados++;
                    }
                }
                alert(`Se han procesado ${guardados} productos.`);
                togglePanel('csvPanel');
                document.getElementById('csvFile').value = '';
            };
            reader.readAsText(file);
        }
    </script>

</body>
